<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Pilot - API Explorer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0b0a15 0%, #1a1530 100%);
      color: #e2e8f0;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      padding: 30px 20px;
      margin-bottom: 30px;
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 16px;
    }

    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 10px;
      color: #fff;
    }

    header h1 span {
      color: #8b5cf6;
    }

    header p {
      color: #94a3b8;
      font-size: 14px;
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-box {
      flex: 1;
      min-width: 250px;
      padding: 12px 16px;
      background: #111022;
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }

    .search-box:focus {
      border-color: #8b5cf6;
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
    }

    .filter-group {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 8px 14px;
      background: #111022;
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 8px;
      color: #cbd5e1;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover {
      background: rgba(139, 92, 246, 0.1);
      border-color: #8b5cf6;
    }

    .filter-btn.active {
      background: #8b5cf6;
      color: #fff;
      border-color: #8b5cf6;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: #111022;
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }

    .stat-number {
      font-size: 28px;
      font-weight: 800;
      color: #8b5cf6;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 12px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .category {
      margin-bottom: 32px;
    }

    .category-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(139, 92, 246, 0.2);
    }

    .category-icon {
      width: 36px;
      height: 36px;
      background: rgba(139, 92, 246, 0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .category-title {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }

    .category-count {
      margin-left: auto;
      background: rgba(139, 92, 246, 0.2);
      color: #a78bfa;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 700;
    }

    .endpoint {
      background: #111022;
      border: 1px solid rgba(139, 92, 246, 0.15);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 10px;
      transition: all 0.2s;
      cursor: pointer;
    }

    .endpoint:hover {
      border-color: #8b5cf6;
      transform: translateX(4px);
      box-shadow: 0 4px 20px rgba(139, 92, 246, 0.15);
    }

    .endpoint-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .method {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.5px;
      min-width: 60px;
      text-align: center;
    }

    .method.GET { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
    .method.POST { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
    .method.PUT { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
    .method.DELETE { background: rgba(239, 68, 68, 0.2); color: #f87171; }

    .path {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 14px;
      color: #fff;
      font-weight: 600;
      flex: 1;
    }

    .badges {
      display: flex;
      gap: 6px;
    }

    .badge {
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .badge.auth {
      background: rgba(251, 191, 36, 0.2);
      color: #fbbf24;
    }

    .badge.public {
      background: rgba(34, 197, 94, 0.2);
      color: #4ade80;
    }

    .badge.rate-limit {
      background: rgba(239, 68, 68, 0.2);
      color: #f87171;
    }

    .endpoint-desc {
      color: #94a3b8;
      font-size: 13px;
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .endpoint-meta {
      display: flex;
      gap: 16px;
      font-size: 11px;
      color: #64748b;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .action-btns {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .action-btn {
      padding: 6px 12px;
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 6px;
      color: #a78bfa;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .action-btn:hover {
      background: #8b5cf6;
      color: #fff;
    }

    .response-panel {
      margin-top: 12px;
      padding: 12px;
      background: #0b0a15;
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 8px;
      display: none;
    }

    .response-panel.visible {
      display: block;
    }

    .response-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .response-status {
      font-size: 12px;
      font-weight: 700;
    }

    .response-status.success { color: #4ade80; }
    .response-status.error { color: #f87171; }

    .response-body {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #cbd5e1;
      background: #000;
      padding: 12px;
      border-radius: 6px;
      max-height: 300px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #64748b;
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #8b5cf6;
      color: #fff;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s;
      z-index: 1000;
    }

    .toast.visible {
      transform: translateY(0);
      opacity: 1;
    }

    .hidden { display: none !important; }

    @media (max-width: 768px) {
      .path { font-size: 12px; }
      .endpoint-header { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Portal <span>Pilot</span> - API Explorer</h1>
      <p>Explora y prueba todos los endpoints del backend</p>
    </header>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-number" id="totalEndpoints">0</div>
        <div class="stat-label">Total Endpoints</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="publicEndpoints">0</div>
        <div class="stat-label">Públicos</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="protectedEndpoints">0</div>
        <div class="stat-label">Protegidos</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="visibleEndpoints">0</div>
        <div class="stat-label">Visibles</div>
      </div>
    </div>

    <div class="controls">
      <input type="text" class="search-box" id="searchInput" placeholder="🔍 Buscar endpoint (ej: login, users, tenant)...">
      <div class="filter-group" id="methodFilters">
        <button class="filter-btn active" data-method="ALL">Todos</button>
        <button class="filter-btn" data-method="GET">GET</button>
        <button class="filter-btn" data-method="POST">POST</button>
        <button class="filter-btn" data-method="PUT">PUT</button>
        <button class="filter-btn" data-method="DELETE">DELETE</button>
      </div>
      <div class="filter-group" id="authFilters">
        <button class="filter-btn active" data-auth="ALL">Todos</button>
        <button class="filter-btn" data-auth="public">Públicos</button>
        <button class="filter-btn" data-auth="auth">Protegidos</button>
      </div>
    </div>

    <div id="endpointsContainer"></div>
  </div>

  <div class="toast" id="toast">✓ Copiado al portapapeles</div>

  <script>
    // ============================================================
    // DEFINICIÓN DE TODOS LOS ENDPOINTS DEL BACKEND
    // ============================================================
    const endpoints = [
      // ===== DIAGNÓSTICO Y MONITOREO =====
      {
        category: '🔧 Diagnóstico y Monitoreo',
        categoryIcon: '🔧',
        items: [
          {
            method: 'GET',
            path: '/api/health',
            auth: false,
            description: 'Verifica el estado del servidor y configuración.',
            body: null,
            testable: true
          },
          {
            method: 'GET',
            path: '/api/diagnostico',
            auth: false,
            description: 'Diagnóstico completo del entorno: variables de entorno, conexión a NocoDB, etc.',
            body: null,
            testable: true
          },
          {
            method: 'GET',
            path: '/api/check-email',
            auth: false,
            description: 'Lista los primeros 50 usuarios registrados (temporal para debugging).',
            body: null,
            testable: true
          }
        ]
      },

      // ===== AUTENTICACIÓN =====
      {
        category: '🔐 Autenticación',
        categoryIcon: '🔐',
        items: [
          {
            method: 'POST',
            path: '/api/registro',
            auth: false,
            description: 'Registra un nuevo usuario y empresa. Crea ambos registros en NocoDB.',
            body: {
              empresaNombre: 'string',
              empresaCodigo: 'string',
              empresaSector: 'string',
              usuarioNombre: 'string',
              usuarioApellido: 'string',
              email: 'string',
              rol: 'string',
              password: 'string',
              dosFaActivo: 'boolean',
              terminosAceptados: 'boolean'
            }
          },
          {
            method: 'POST',
            path: '/api/login',
            auth: false,
            rateLimit: true,
            description: 'Inicia sesión con email y contraseña. Devuelve JWT y datos del usuario.',
            body: {
              email: 'string',
              password: 'string'
            }
          },
          {
            method: 'POST',
            path: '/api/refresh',
            auth: true,
            description: 'Refresca el token JWT por 2 horas más.',
            body: null
          }
        ]
      },

      // ===== RECUPERACIÓN DE CONTRASEÑA =====
      {
        category: '🔑 Recuperación de Contraseña',
        categoryIcon: '🔑',
        items: [
          {
            method: 'POST',
            path: '/api/recuperacion',
            auth: false,
            rateLimit: true,
            description: 'Solicita un código de recuperación de 6 dígitos por email.',
            body: {
              email: 'string'
            }
          },
          {
            method: 'POST',
            path: '/api/recuperacion/verificar',
            auth: false,
            rateLimit: true,
            description: 'Verifica el código y establece una nueva contraseña.',
            body: {
              email: 'string',
              code: 'string',
              newPassword: 'string'
            }
          }
        ]
      },

      // ===== GESTIÓN DE TENANTS (EMPRESAS) =====
      {
        category: '🏢 Gestión de Tenants',
        categoryIcon: '🏢',
        items: [
          {
            method: 'GET',
            path: '/api/tenants',
            auth: true,
            description: 'Lista todos los tenants (empresas) registrados con conteo de usuarios.',
            body: null,
            testable: true
          },
          {
            method: 'POST',
            path: '/api/tenants',
            auth: true,
            description: 'Crea un nuevo tenant y un usuario administrador Owner.',
            body: {
              nombre: 'string',
              dominio: 'string',
              plan: 'string (starter|pro|enterprise)',
              emailAdmin: 'string',
              pais: 'string',
              zonaHoraria: 'string',
              notas: 'string'
            }
          },
          {
            method: 'GET',
            path: '/api/tenant/:id',
            auth: true,
            description: 'Obtiene el detalle completo de un tenant específico.',
            body: null,
            testable: true,
            params: ['id']
          },
          {
            method: 'PUT',
            path: '/api/tenants/:id',
            auth: true,
            description: 'Actualiza el plan o estado de un tenant.',
            body: {
              plan: 'string (opcional)',
              estado: 'string (opcional)'
            },
            params: ['id']
          },
          {
            method: 'DELETE',
            path: '/api/tenants/:id',
            auth: true,
            description: 'Elimina un tenant y todos sus usuarios asociados.',
            body: null,
            params: ['id']
          }
        ]
      },

      // ===== GESTIÓN DE USUARIOS =====
      {
        category: '👥 Gestión de Usuarios',
        categoryIcon: '👥',
        items: [
          {
            method: 'GET',
            path: '/api/users',
            auth: true,
            description: 'Lista todos los usuarios. Filtrable por empresa con ?empresa=codigo.',
            body: null,
            testable: true,
            queryParams: ['empresa']
          },
          {
            method: 'GET',
            path: '/api/users/:id',
            auth: true,
            description: 'Obtiene el detalle de un usuario específico.',
            body: null,
            testable: true,
            params: ['id']
          },
          {
            method: 'POST',
            path: '/api/users',
            auth: true,
            description: 'Crea un nuevo usuario y envía correo de activación.',
            body: {
              nombre: 'string',
              apellido: 'string',
              email: 'string',
              rol: 'string',
              tenant: 'string (código o nombre)',
              notas: 'string',
              password: 'string (opcional, se genera si no se envía)'
            }
          },
          {
            method: 'PUT',
            path: '/api/users/:id',
            auth: true,
            description: 'Actualiza un usuario (datos, rol, estado, tenant, contraseña).',
            body: {
              nombre: 'string',
              apellido: 'string',
              email: 'string',
              rol: 'string',
              tenant: 'string',
              notas: 'string',
              status: 'string (active|suspended|pending)',
              password: 'string',
              reason: 'string'
            },
            params: ['id']
          },
          {
            method: 'DELETE',
            path: '/api/users/:id',
            auth: true,
            description: 'Elimina un usuario (soft delete si falla el hard delete).',
            body: null,
            params: ['id']
          }
        ]
      },

      // ===== NOTIFICACIONES POR EMAIL =====
      {
        category: '📧 Notificaciones por Email',
        categoryIcon: '📧',
        items: [
          {
            method: 'POST',
            path: '/api/notify/onboarding',
            auth: true,
            description: 'Envía manualmente un correo de onboarding a un usuario.',
            body: {
              email: 'string'
            }
          },
          {
            method: 'POST',
            path: '/api/notify/activation',
            auth: true,
            description: 'Envía manualmente un correo de activación con contraseña temporal.',
            body: {
              email: 'string',
              password: 'string',
              tenantName: 'string (opcional)'
            }
          }
        ]
      },

      // ===== SEGURIDAD =====
      {
        category: '🛡️ Seguridad',
        categoryIcon: '🛡️',
        items: [
          {
            method: 'POST',
            path: '/api/alerta-no-autorizado',
            auth: false,
            description: 'Reporta un intento de acceso no autorizado (bypass de autenticación).',
            body: {
              url: 'string',
              referrer: 'string'
            }
          }
        ]
      },

      // ===== DEBUG =====
      {
        category: '🐛 Debug (Solo Admin/Root)',
        categoryIcon: '🐛',
        items: [
          {
            method: 'GET',
            path: '/api/debug/tenants/:id',
            auth: true,
            description: 'Debug detallado de búsqueda de tenant por ID/código.',
            body: null,
            testable: true,
            params: ['id']
          },
          {
            method: 'GET',
            path: '/api/debug/empresas/sample',
            auth: true,
            description: 'Muestra muestra de empresas con todos sus campos (para debugging).',
            body: null,
            testable: true,
            queryParams: ['limit']
          }
        ]
      }
    ];

    // ============================================================
    // ESTADO DE LA APLICACIÓN
    // ============================================================
    let currentMethodFilter = 'ALL';
    let currentAuthFilter = 'ALL';
    let currentSearch = '';
    let authToken = localStorage.getItem('pp_auth_token') || '';

    // ============================================================
    // UTILIDADES
    // ============================================================
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('visible');
      setTimeout(() => toast.classList.remove('visible'), 2500);
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        showToast('✓ Copiado: ' + text);
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ============================================================
    // RENDERIZADO
    // ============================================================
    function renderEndpoints() {
      const container = document.getElementById('endpointsContainer');
      container.innerHTML = '';
      
      let visibleCount = 0;
      let totalPublic = 0;
      let totalProtected = 0;
      let totalAll = 0;

      endpoints.forEach(category => {
        const filteredItems = category.items.filter(item => {
          const matchesMethod = currentMethodFilter === 'ALL' || item.method === currentMethodFilter;
          const matchesAuth = currentAuthFilter === 'ALL' || 
                             (currentAuthFilter === 'public' && !item.auth) ||
                             (currentAuthFilter === 'auth' && item.auth);
          const matchesSearch = currentSearch === '' ||
                               item.path.toLowerCase().includes(currentSearch) ||
                               item.description.toLowerCase().includes(currentSearch);
          return matchesMethod && matchesAuth && matchesSearch;
        });

        if (filteredItems.length === 0) return;

        const categoryDiv = document.createElement('div');
        categoryDiv.className = 'category';
        
        categoryDiv.innerHTML = `
          <div class="category-header">
            <div class="category-icon">${category.categoryIcon}</div>
            <div class="category-title">${category.category}</div>
            <div class="category-count">${filteredItems.length} endpoints</div>
          </div>
        `;

        filteredItems.forEach(item => {
          totalAll++;
          if (item.auth) totalProtected++;
          else totalPublic++;
          visibleCount++;

          const endpointDiv = document.createElement('div');
          endpointDiv.className = 'endpoint';
          
          const badges = [];
          if (item.auth) badges.push('<span class="badge auth">🔒 Auth</span>');
          else badges.push('<span class="badge public">🌐 Público</span>');
          if (item.rateLimit) badges.push('<span class="badge rate-limit">⚡ Rate Limit</span>');

          const bodyPreview = item.body 
            ? `<div class="endpoint-meta"><span class="meta-item">📦 Body: ${Object.keys(item.body).length} campos</span></div>`
            : '';

          const paramsPreview = item.params 
            ? `<span class="meta-item">🔗 Params: ${item.params.join(', ')}</span>`
            : '';
          
          const queryParamsPreview = item.queryParams 
            ? `<span class="meta-item">❓ Query: ${item.queryParams.join(', ')}</span>`
            : '';

          endpointDiv.innerHTML = `
            <div class="endpoint-header">
              <span class="method ${item.method}">${item.method}</span>
              <span class="path">${escapeHtml(item.path)}</span>
              <div class="badges">${badges.join('')}</div>
            </div>
            <div class="endpoint-desc">${escapeHtml(item.description)}</div>
            <div class="endpoint-meta">
              ${paramsPreview}
              ${queryParamsPreview}
            </div>
            ${bodyPreview}
            <div class="action-btns">
              <button class="action-btn" onclick="event.stopPropagation(); copyToClipboard('${item.path}')">📋 Copiar ruta</button>
              ${item.testable ? `<button class="action-btn" onclick="event.stopPropagation(); testEndpoint(this, '${item.method}', '${item.path}')">▶️ Probar</button>` : ''}
              ${item.body ? `<button class="action-btn" onclick="event.stopPropagation(); toggleBody(this)">📦 Ver body</button>` : ''}
            </div>
            ${item.body ? `<div class="response-panel"><div class="response-body">${escapeHtml(JSON.stringify(item.body, null, 2))}</div></div>` : ''}
            <div class="response-panel" data-response>
              <div class="response-header">
                <span class="response-status"></span>
                <button class="action-btn" onclick="event.stopPropagation(); this.parentElement.parentElement.classList.remove('visible')">✕ Cerrar</button>
              </div>
              <div class="response-body"></div>
            </div>
          `;

          categoryDiv.appendChild(endpointDiv);
        });

        container.appendChild(categoryDiv);
      });

      document.getElementById('totalEndpoints').textContent = totalAll;
      document.getElementById('publicEndpoints').textContent = totalPublic;
      document.getElementById('protectedEndpoints').textContent = totalProtected;
      document.getElementById('visibleEndpoints').textContent = visibleCount;

      if (visibleCount === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🔍</div>
            <h3>No se encontraron endpoints</h3>
            <p>Intenta con otros filtros o términos de búsqueda</p>
          </div>
        `;
      }
    }

    // ============================================================
    // FUNCIONES DE INTERACCIÓN
    // ============================================================
    function toggleBody(btn) {
      const panel = btn.closest('.endpoint').querySelector('.response-panel:not([data-response])');
      panel.classList.toggle('visible');
      btn.textContent = panel.classList.contains('visible') ? '📦 Ocultar body' : '📦 Ver body';
    }

    async function testEndpoint(btn, method, path) {
      const endpoint = btn.closest('.endpoint');
      const responsePanel = endpoint.querySelector('[data-response]');
      const statusEl = responsePanel.querySelector('.response-status');
      const bodyEl = responsePanel.querySelector('.response-body');

      let finalPath = path;
      
      // Reemplazar parámetros
      if (path.includes(':id')) {
        const id = prompt('Ingresa el valor del parámetro :id', '1');
        if (!id) return;
        finalPath = path.replace(':id', id);
      }

      // Agregar query params si existen
      const endpointData = endpoints.flatMap(c => c.items).find(e => e.path === path);
      if (endpointData?.queryParams) {
        const params = new URLSearchParams();
        endpointData.queryParams.forEach(qp => {
          const val = prompt(`Valor para ?${qp} (dejar vacío para omitir)`, '');
          if (val) params.append(qp, val);
        });
        const qs = params.toString();
        if (qs) finalPath += '?' + qs;
      }

      btn.textContent = '⏳ Probando...';
      btn.disabled = true;

      try {
        const headers = { 'Content-Type': 'application/json' };
        if (endpointData?.auth && authToken) {
          headers['Authorization'] = `Bearer ${authToken}`;
        }

        const options = { method, headers };
        
        if (['POST', 'PUT'].includes(method) && endpointData?.body) {
          options.body = JSON.stringify(endpointData.body);
        }

        const response = await fetch(finalPath, options);
        const data = await response.text();
        
        let formattedData;
        try {
          formattedData = JSON.stringify(JSON.parse(data), null, 2);
        } catch {
          formattedData = data;
        }

        statusEl.textContent = `${response.status} ${response.statusText}`;
        statusEl.className = 'response-status ' + (response.ok ? 'success' : 'error');
        bodyEl.textContent = formattedData;
        responsePanel.classList.add('visible');

        showToast(response.ok ? '✓ Respuesta recibida' : '✗ Error en la respuesta');
      } catch (error) {
        statusEl.textContent = 'ERROR DE RED';
        statusEl.className = 'response-status error';
        bodyEl.textContent = error.message;
        responsePanel.classList.add('visible');
        showToast('✗ Error de red');
      } finally {
        btn.textContent = '▶️ Probar';
        btn.disabled = false;
      }
    }

    // ============================================================
    // EVENT LISTENERS
    // ============================================================
    document.getElementById('searchInput').addEventListener('input', (e) => {
      currentSearch = e.target.value.toLowerCase().trim();
      renderEndpoints();
    });

    document.getElementById('methodFilters').addEventListener('click', (e) => {
      if (e.target.classList.contains('filter-btn')) {
        document.querySelectorAll('#methodFilters .filter-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        currentMethodFilter = e.target.dataset.method;
        renderEndpoints();
      }
    });

    document.getElementById('authFilters').addEventListener('click', (e) => {
      if (e.target.classList.contains('filter-btn')) {
        document.querySelectorAll('#authFilters .filter-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        currentAuthFilter = e.target.dataset.auth;
        renderEndpoints();
      }
    });

    // ============================================================
    // INICIALIZACIÓN
    // ============================================================
    renderEndpoints();
  </script>
</body>
</html>
